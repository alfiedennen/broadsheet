<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#1a1814" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="description" content="An editorial frontend for Home Assistant." />
		<title>broadsheet</title>

		<!--
			Four-font editorial register — preconnect first so DNS+TLS
			complete before the font CSS request lands. Font stacks in
			app.css fall back to Iowan/Georgia/system if Google Fonts
			ever fail (offline LAN, blocked DNS, etc.).
		-->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
			rel="stylesheet"
		/>

		<!--
			Runtime env injection point. The HA add-on's run.sh writes
			a fresh runtime-env.js on every container boot, populating
			window.__BROADSHEET_ENV__ with SUPERVISOR_TOKEN + ingressEntry.
			Empty in dev / standalone — auth.ts falls through to LLAT.
			404 on this script is fine (added defer + no error handler).
		-->
		<script src="./runtime-env.js" defer onerror="void 0"></script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
