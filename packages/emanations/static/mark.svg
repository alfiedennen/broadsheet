<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="emanations">
  <!--
    The emanations mark — concentric rings radiating from a warm
    centre. Shipped as a plugin static asset; served at
    /plugin-assets/emanations/mark.svg, resolved via pluginAssetUrl.
    A P3 placeholder that proves the asset pipeline end to end; the
    real painting set lands in P4.
  -->
  <defs>
    <radialGradient id="em-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8b878" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c08a4a" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#3a4a6a" stroke-width="1.4" stroke-opacity="0.55"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="#5a6a8a" stroke-width="1.4" stroke-opacity="0.6"/>
  <circle cx="60" cy="60" r="24" fill="none" stroke="#c08a4a" stroke-width="1.6" stroke-opacity="0.7"/>
  <circle cx="60" cy="60" r="11" fill="url(#em-core)"/>
</svg>
