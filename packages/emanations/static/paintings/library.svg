<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Library — an ambient painting">
  <!-- A P4 test painting (the library). Cooler, deeper — see office.svg. -->
  <defs>
    <radialGradient id="library-glow" cx="62%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#8a9ec0" stop-opacity="0.5"/>
      <stop offset="48%" stop-color="#4a5a7a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#16181e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="library-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2028" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0c0d10" stop-opacity="0.92"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="#16181e"/>
  <rect width="800" height="450" fill="url(#library-glow)"/>
  <!-- shelf bands, suggested -->
  <g stroke="#3a4254" stroke-width="2" stroke-opacity="0.5">
    <line x1="40" y1="120" x2="320" y2="120"/>
    <line x1="40" y1="178" x2="320" y2="178"/>
    <line x1="40" y1="236" x2="320" y2="236"/>
  </g>
  <!-- a low warm lamp glow, lower-right, so it isn't all cold -->
  <circle cx="620" cy="320" r="120" fill="#e8b878" fill-opacity="0.12"/>
  <rect width="800" height="450" fill="url(#library-floor)"/>
</svg>
