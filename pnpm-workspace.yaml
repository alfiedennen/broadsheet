packages:
  - 'packages/*'
  # 'apps/addon' is the HA add-on packaging — has its own Dockerfile,
  # not a JS package. Excluded from the workspace.

# pnpm 11+ blocks postinstall scripts of unknown dependencies unless
# explicitly allowlisted via the `allowBuilds:` map (this is pnpm's
# NEW schema as of v11; the older `onlyBuiltDependencies:` array is
# no longer respected). pnpm itself writes a placeholder block when
# it detects unapproved scripts — set each entry to true/false.
#
# Three transitive deps need their build scripts to run:
#   - esbuild      — vite's underlying bundler; fetches the prebuilt
#                    native binary for the host platform on install.
#   - protobufjs   — pulled in by @xenova/transformers (Plan 4 memory
#                    embeddings) for serialisation; the postinstall
#                    just sets up a CLI bin, no native compile.
#   - sharp        — also pulled by @xenova/transformers; fetches a
#                    prebuilt libvips binary for image processing
#                    (used by transformers for vision-model tensors —
#                    we only use text embeddings so the binary is dead
#                    weight, but disabling it breaks the install).
# Without these set to true, `pnpm install --frozen-lockfile` exits
# with ERR_PNPM_IGNORED_BUILDS, blocking CI image builds.
allowBuilds:
  esbuild: true
  protobufjs: true
  sharp: true
